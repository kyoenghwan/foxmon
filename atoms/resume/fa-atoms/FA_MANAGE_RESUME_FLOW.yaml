FA_MANAGE_RESUME_FLOW:
  id: "FA_MANAGE_RESUME_FLOW"
  type: "flow"
  description: "사용자 이력서 리스트 조회 및 저장 관리 메인 플로우"
  
  input:
    actionType: "string ('GET' | 'SAVE')"
    userId: "string"
    resumeData: "any (optional)"
  
  output:
    success: "boolean"
    resumes: "array (optional)"
    message: "string"
  
  steps:
    - step: 1
      name: "사용자 이력서 리스트 조회 (GET 액션일 시)"
      atom: "QA_GET_USER_RESUMES"
      input_mapping:
        userId: "context.input.userId"
      output_save_as: "resumeListResult"

    - step: 2
      name: "입력 데이터 검증 (SAVE 액션일 시)"
      atom: "RA_VALIDATE_RESUME_FORM"
      input_mapping:
        resumeData: "context.input.resumeData"
      output_save_as: "validationResult"

    - step: 3
      name: "이력서 DB Upsert (저장/업데이트)"
      atom: "OA_UPSERT_RESUME"
      input_mapping:
        userId: "context.input.userId"
        resumeData: "context.validationResult.data"
      output_save_as: "saveResult"
