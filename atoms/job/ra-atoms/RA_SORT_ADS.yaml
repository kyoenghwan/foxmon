RA_SORT_ADS:
  id: "RA_SORT_ADS"
  type: "rule"
  description: "광고 목록을 로테이션 규칙(노출 횟수, 시간, 랜덤)에 따라 정렬합니다."
  
  input:
    ads: "AdItem[]"
    count: "number"
  
  output:
    data: "AdItem[]"
  
  logic:
    - "1시간 이내 노출 여부에 따른 그룹화"
    - "노출 횟수 오름차순 정렬"
    - "마지막 노출 시간 오름차순 정렬"
    - "결과 랜덤화 및 count만큼 슬라이싱"
