# ─────────────────────────────────────────────
# 1. 전역 레이아웃 컴포넌트
# ─────────────────────────────────────────────
global_components:

  TOP_NAVIGATION:
    label: "상단 메인 헤더 네비게이션"
    keywords: ["상단 메뉴", "네비게이션", "메뉴바", "헤더", "GNB"]
    shared_style: true
    style_group: "NAV_MENU_ITEMS"
    files: ["components/layout/main-header.tsx"]
    elements:
      - name: "HOME_MENU"
        keywords: ["홈", "home", "첫화면", "메인"]
        type: "nav-item"
      - name: "JOB_MENU"
        keywords: ["구인정보", "jobs", "채용공고", "구인"]
        type: "nav-item"
      - name: "TALENT_MENU"
        keywords: ["인재정보", "구직", "talent", "구직자"]
        type: "nav-item"
      - name: "COMMUNITY_MENU"
        keywords: ["커뮤니티", "community", "게시판"]
        type: "nav-item"
      - name: "SUPPORT_MENU"
        keywords: ["고객센터", "support", "문의", "FAQ"]
        type: "nav-item"
      - name: "NOTICE_DROPDOWN_LINK"
        keywords: ["공지사항", "공지"]
        selector: "header a[href='/notice']"
        type: "link"
      - name: "AD_PRODUCT_DROPDOWN_LINK"
        keywords: ["광고상품안내", "광고 등록", "프리미엄 등록"]
        selector: "header a[href='/jobs/post']"
        type: "link"

  SUB_PAGE_LAYOUT:
    label: "서브 페이지 공통 레이아웃 (최대 너비/패딩)"
    keywords: ["서브 레이아웃", "공통 레이아웃", "컨테이너"]
    files: ["components/layout/sub-page-layout.tsx"]

  SIDE_BANNERS:
    label: "우측 사이드 배너 (PC 전용)"
    keywords: ["사이드 배너", "우측 배너", "side banner"]
    files: ["components/home/side-banners.tsx"]
    responsive_variants:
      - viewport: "desktop (xl+)"
        note: "xl 해상도 이상에서만 표시"
      - viewport: "mobile"
        note: "모바일에서 hidden 처리"

  MAIN_NAV:
    label: "메인 네비게이션 (모바일/데스크톱 공용)"
    keywords: ["메인 네비", "하단 탭", "네비 바"]
