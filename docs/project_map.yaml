# ─────────────────────────────────────────────
# 3. Atom 색인 (FA / OA / QA / RA)
# ─────────────────────────────────────────────
atoms:

  flow_atoms:
    - id: "FA_LOGIN_FLOW"
      file: "src/atoms/fa/auth/FA_LOGIN_FLOW.ts"
      description: "로그인 전체 플로우"
      uses: ["RA_VALIDATE_LOGIN", "QA_GET_USER_AUTH", "OA_CREATE_GUEST_SESSION"]

    - id: "FA_REGISTER_FLOW"
      file: "src/atoms/fa/auth/FA_REGISTER_FLOW.ts"
      description: "회원가입 전체 플로우"
      uses: ["RA_HASH_PASSWORD", "QA_CHECK_EMAIL_EXISTS", "OA_CREATE_USER"]

    - id: "FA_USER_SETTINGS_FLOW"
      file: "src/atoms/fa/auth/FA_USER_SETTINGS_FLOW.ts"
      description: "회원 정보 수정 / 비밀번호 변경 플로우"
      uses: ["RA_VALIDATE_USER_SETTINGS", "OA_UPDATE_USER_PROFILE", "OA_CHANGE_PASSWORD"]

    - id: "FA_VERIFY_AGE_FLOW"
      file: "src/atoms/fa/auth/FA_VERIFY_AGE_FLOW.ts"
      description: "성인 인증 플로우"
      uses: ["OA_UPDATE_AGE_VERIFIED"]

    - id: "FA_FIND_ACCOUNT_FLOW"
      file: "src/atoms/fa/auth/FA_FIND_ACCOUNT_FLOW.ts"
      description: "아이디/비밀번호 찾기 플로우"
      uses: ["QA_FIND_USER_BY_INFO", "OA_RESET_USER_PASSWORD"]

    - id: "FA_GUEST_AUTH"
      file: "src/atoms/fa/auth/FA_GUEST_AUTH.ts"
      description: "게스트 세션 인증 플로우"
      uses: ["OA_CREATE_GUEST_SESSION"]

    - id: "FA_MANAGE_RESUME_FLOW"
      file: "src/atoms/fa/resume/FA_MANAGE_RESUME_FLOW.ts"
      description: "이력서 생성/수정/삭제/공개 토글 플로우"
      uses: ["OA_UPSERT_RESUME", "OA_DELETE_RESUME", "OA_TOGGLE_RESUME_PUBLIC"]

    - id: "FA_RECHARGE_POINT_FLOW"
      file: "src/atoms/fa/points/FA_RECHARGE_POINT_FLOW.ts"
      description: "포인트 충전 플로우"
